name: Build Panel Loop V3 Pro Plus EXE

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout files
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: python -m pip install pyinstaller

      - name: Build EXE
        run: python -m PyInstaller --onefile --windowed --name PanelLoopV3ProPlus Panel_Loop_v3_ProPlus.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanelLoopV3ProPlus-Windows-EXE
          path: dist/PanelLoopV3ProPlus.exe
